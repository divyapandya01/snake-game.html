<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VIPER // coin-op snake</title>
<style>
  @font-face {
    font-family: 'Pixel';
    src: local('Courier New');
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
    background: #0d0906;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at 50% 0%, #241a10 0%, #0d0906 60%);
    padding: 16px;
  }

  .cabinet {
    position: relative;
    width: min(94vw, 560px);
    background:
      linear-gradient(180deg, #4a3018 0%, #2e1c0c 40%, #1c1108 100%);
    border-radius: 18px;
    padding: 22px 22px 28px;
    box-shadow:
      0 0 0 2px #100a05,
      0 20px 50px rgba(0,0,0,0.7),
      inset 0 2px 0 rgba(255,255,255,0.06);
  }

  .cabinet::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 14px;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(115deg, rgba(0,0,0,0.10) 0px, rgba(0,0,0,0.10) 1px, transparent 1px, transparent 7px);
    opacity: 0.5;
  }

  .marquee {
    text-align: center;
    margin-bottom: 14px;
  }

  .marquee .title {
    font-family: 'Press Start 2P', 'Courier New', monospace;
    font-size: clamp(20px, 5.5vw, 30px);
    letter-spacing: 4px;
    color: #ffb000;
    text-shadow: 0 0 6px #ff8c00, 0 0 18px rgba(255, 140, 0, 0.55);
    margin: 0;
  }

  .marquee .subtitle {
    font-size: 10px;
    letter-spacing: 3px;
    color: #d8b98a;
    margin-top: 6px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .screen-frame {
    position: relative;
    background: #05130c;
    border-radius: 8px;
    padding: 14px;
    box-shadow:
      inset 0 0 0 2px #000,
      inset 0 0 40px rgba(0,0,0,0.9),
      0 0 0 6px #17100a,
      0 0 0 8px #000;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    color: #33ff8f;
    text-shadow: 0 0 5px rgba(51,255,143,0.65);
    font-size: clamp(10px, 3vw, 13px);
    padding: 0 2px 10px;
    letter-spacing: 1px;
  }

  .hud .label { color: #1f8f57; font-size: 0.75em; display: block; margin-bottom: 3px; }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    background: #05130c;
    image-rendering: pixelated;
    border-radius: 2px;
  }

  .crt-overlay {
    position: absolute;
    inset: 14px;
    pointer-events: none;
    border-radius: 8px;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.18) 0px,
      rgba(0,0,0,0.18) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: multiply;
  }

  .crt-vignette {
    position: absolute;
    inset: 14px;
    pointer-events: none;
    border-radius: 8px;
    box-shadow: inset 0 0 60px 20px rgba(0,0,0,0.65);
  }

  .overlay-msg {
    position: absolute;
    inset: 14px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(3, 12, 8, 0.88);
    color: #ffb000;
    text-align: center;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    padding: 20px;
    opacity: 1;
    transition: opacity 0.2s ease;
  }

  .overlay-msg.hidden { opacity: 0; pointer-events: none; }

  .overlay-msg h2 {
    font-size: clamp(14px, 4vw, 20px);
    margin: 0;
    text-shadow: 0 0 8px rgba(255,140,0,0.7);
    letter-spacing: 2px;
  }

  .overlay-msg p {
    font-size: clamp(9px, 2.6vw, 11px);
    color: #7ce6a8;
    margin: 0;
    line-height: 1.8;
  }

  .press-start {
    font-size: clamp(9px, 2.8vw, 12px);
    color: #33ff8f;
    animation: blink 1.1s steps(1) infinite;
  }

  @keyframes blink { 50% { opacity: 0.15; } }

  .controls-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
  }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 46px);
    grid-template-rows: repeat(3, 46px);
    gap: 4px;
  }

  .dpad button {
    grid-column: auto;
    background: linear-gradient(180deg, #3a2814, #1c1208);
    border: 1px solid #57391a;
    border-radius: 8px;
    color: #ffb000;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 0 #0c0803, inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .dpad button:active { transform: translateY(2px); box-shadow: 0 1px 0 #0c0803; }

  .dpad .up { grid-column: 2; grid-row: 1; }
  .dpad .left { grid-column: 1; grid-row: 2; }
  .dpad .right { grid-column: 3; grid-row: 2; }
  .dpad .down { grid-column: 2; grid-row: 3; }

  .side-buttons {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10px;
  }

  .pill-btn {
    background: linear-gradient(180deg, #3a2814, #1c1208);
    border: 1px solid #57391a;
    border-radius: 20px;
    color: #d8b98a;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 10px 16px;
    box-shadow: 0 3px 0 #0c0803, inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .pill-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #0c0803; }

  .footer-note {
    text-align: center;
    color: #6b5535;
    font-size: 9px;
    letter-spacing: 1px;
    margin-top: 14px;
    text-transform: uppercase;
  }

  @media (hover: hover) {
    .dpad, .side-buttons { display: none; }
  }
</style>
</head>
<body>

<div class="cabinet">
  <div class="marquee">
    <p class="title">VIPER</p>
    <p class="subtitle">coin-op edition &mdash; 1 player</p>
  </div>

  <div class="screen-frame">
    <div class="hud">
      <div><span class="label">score</span><span id="score">000</span></div>
      <div><span class="label">best</span><span id="best">000</span></div>
      <div><span class="label">speed</span><span id="speed">01</span></div>
    </div>

    <canvas id="game" width="400" height="400"></canvas>

    <div class="crt-overlay"></div>
    <div class="crt-vignette"></div>

    <div class="overlay-msg" id="overlay">
      <h2 id="overlay-title">Viper</h2>
      <p id="overlay-text">Guide the viper to every glowing node.<br>Don't bite yourself. Don't hit the wall.</p>
      <p class="press-start" id="overlay-action">press any key / tap to start</p>
    </div>
  </div>

  <div class="controls-row">
    <div class="dpad">
      <button class="up" aria-label="up">&#9650;</button>
      <button class="left" aria-label="left">&#9664;</button>
      <button class="right" aria-label="right">&#9654;</button>
      <button class="down" aria-label="down">&#9660;</button>
    </div>
    <div class="side-buttons">
      <button class="pill-btn" id="pause-btn">pause</button>
      <button class="pill-btn" id="restart-btn">restart</button>
    </div>
  </div>

  <p class="footer-note">arrow keys or wasd &middot; space to pause</p>
</div>

<script src="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" onerror="this.remove()"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const GRID = 20;
  const CELLS = canvas.width / GRID;

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const speedEl = document.getElementById('speed');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayText = document.getElementById('overlay-text');
  const overlayAction = document.getElementById('overlay-action');

  let snake, dir, nextDir, food, score, best, running, paused, tickMs, loopHandle, level;
  best = 0;

  function pad(n) { return String(n).padStart(3, '0'); }

  function resetGame() {
    snake = [
      { x: 8, y: 10 },
      { x: 7, y: 10 },
      { x: 6, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    level = 1;
    tickMs = 140;
    placeFood();
    scoreEl.textContent = pad(score);
    speedEl.textContent = String(level).padStart(2, '0');
    running = false;
    paused = false;
  }

  function placeFood() {
    let ok = false;
    while (!ok) {
      food = { x: Math.floor(Math.random() * CELLS), y: Math.floor(Math.random() * CELLS) };
      ok = !snake.some(s => s.x === food.x && s.y === food.y);
    }
  }

  function showOverlay(title, text, action) {
    overlayTitle.textContent = title;
    overlayText.innerHTML = text;
    overlayAction.textContent = action;
    overlay.classList.remove('hidden');
  }

  function hideOverlay() {
    overlay.classList.add('hidden');
  }

  function startGame() {
    if (running) return;
    hideOverlay();
    running = true;
    paused = false;
    clearInterval(loopHandle);
    loopHandle = setInterval(tick, tickMs);
  }

  function gameOver() {
    running = false;
    clearInterval(loopHandle);
    if (score > best) {
      best = score;
      bestEl.textContent = pad(best);
    }
    showOverlay('Game over', 'You scored <span style="color:#ffb000">' + pad(score) + '</span> points.', 'tap / press key to retry');
    draw();
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      clearInterval(loopHandle);
      showOverlay('Paused', 'Take a breath, pilot.', 'press space to resume');
    } else {
      hideOverlay();
      loopHandle = setInterval(tick, tickMs);
    }
  }

  function tick() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= CELLS || head.y < 0 || head.y >= CELLS) {
      gameOver();
      return;
    }
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = pad(score);
      placeFood();
      if (score % 50 === 0 && tickMs > 60) {
        tickMs -= 10;
        level += 1;
        speedEl.textContent = String(level).padStart(2, '0');
        clearInterval(loopHandle);
        loopHandle = setInterval(tick, tickMs);
      }
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    ctx.fillStyle = '#05130c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(51,255,143,0.05)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= CELLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * GRID, 0);
      ctx.lineTo(i * GRID, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * GRID);
      ctx.lineTo(canvas.width, i * GRID);
      ctx.stroke();
    }

    ctx.fillStyle = '#ffb000';
    ctx.shadowColor = '#ff8c00';
    ctx.shadowBlur = 10;
    const fx = food.x * GRID + GRID / 2;
    const fy = food.y * GRID + GRID / 2;
    ctx.beginPath();
    ctx.arc(fx, fy, GRID / 2.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    snake.forEach((seg, i) => {
      const isHead = i === 0;
      ctx.fillStyle = isHead ? '#7cffb0' : '#33ff8f';
      ctx.shadowColor = '#33ff8f';
      ctx.shadowBlur = isHead ? 8 : 3;
      const pad2 = 1.5;
      ctx.fillRect(seg.x * GRID + pad2, seg.y * GRID + pad2, GRID - pad2 * 2, GRID - pad2 * 2);
    });
    ctx.shadowBlur = 0;
  }

  function setDirection(nx, ny) {
    if (nx === -dir.x && ny === -dir.y) return;
    nextDir = { x: nx, y: ny };
  }

  function handleStartInput() {
    if (!running) {
      resetGame();
      draw();
      startGame();
    }
  }

  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(key) || key === 'w' || key === 'a' || key === 's' || key === 'd') {
      e.preventDefault();
    }

    if (!running) {
      handleStartInput();
      return;
    }

    if (key === ' ') { togglePause(); return; }
    if (paused) return;

    if (key === 'arrowup' || key === 'w') setDirection(0, -1);
    else if (key === 'arrowdown' || key === 's') setDirection(0, 1);
    else if (key === 'arrowleft' || key === 'a') setDirection(-1, 0);
    else if (key === 'arrowright' || key === 'd') setDirection(1, 0);
  });

  overlay.addEventListener('click', handleStartInput);

  document.querySelector('.up').addEventListener('click', () => { if (!running) handleStartInput(); else if (!paused) setDirection(0, -1); });
  document.querySelector('.down').addEventListener('click', () => { if (!running) handleStartInput(); else if (!paused) setDirection(0, 1); });
  document.querySelector('.left').addEventListener('click', () => { if (!running) handleStartInput(); else if (!paused) setDirection(-1, 0); });
  document.querySelector('.right').addEventListener('click', () => { if (!running) handleStartInput(); else if (!paused) setDirection(1, 0); });

  document.getElementById('pause-btn').addEventListener('click', togglePause);
  document.getElementById('restart-btn').addEventListener('click', () => {
    clearInterval(loopHandle);
    resetGame();
    draw();
    showOverlay('Viper', 'Guide the viper to every glowing node.<br>Don\'t bite yourself. Don\'t hit the wall.', 'press any key / tap to start');
  });

  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    if (!running) { handleStartInput(); return; }
    if (paused) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDirection(dx > 0 ? 1 : -1, 0);
    } else {
      setDirection(0, dy > 0 ? 1 : -1);
    }
  }, { passive: true });

  resetGame();
  draw();
})();
</script>

</body>
</html>
